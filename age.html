<!DOCTYPE html>
<html>
<head>
    <title>Professional Age Calculator</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#6a11cb,#2575fc);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            width:400px;
            padding:30px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 0 25px rgba(0,0,0,0.3);
        }

        h1{
            color:#333;
            margin-bottom:20px;
        }

        input{
            width:90%;
            padding:12px;
            font-size:18px;
            border-radius:8px;
            border:1px solid #ccc;
        }

        button{
            margin-top:20px;
            padding:12px 25px;
            font-size:18px;
            background:#2575fc;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#0d5be1;
        }

        #result{
            margin-top:25px;
            font-size:22px;
            font-weight:bold;
            color:#222;
            line-height:1.8;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>🎂 Professional Age Calculator</h1>

    <p>Select Your Date of Birth</p>

    <input type="date" id="dob">

    <br>

    <button onclick="calculateAge()">Calculate Age</button>

    <div id="result"></div>

</div>

<script>

function calculateAge(){

    let dob = document.getElementById("dob").value;

    if(dob==""){
        alert("Please select your Date of Birth");
        return;
    }

    let birth = new Date(dob);
    let today = new Date();

    let years = today.getFullYear() - birth.getFullYear();
    let months = today.getMonth() - birth.getMonth();
    let days = today.getDate() - birth.getDate();

    if(days < 0){
        months--;

        let lastMonth = new Date(today.getFullYear(), today.getMonth(), 0);
        days += lastMonth.getDate();
    }

    if(months < 0){
        years--;
        months += 12;
    }

    document.getElementById("result").innerHTML =
        "🎉 Your Age<br><br>" +
        "👤 Years : " + years + "<br>" +
        "📅 Months : " + months + "<br>" +
        "📆 Days : " + days;
}

</script>

</body>
</html>
