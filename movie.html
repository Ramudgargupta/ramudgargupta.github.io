<!DOCTYPE html>
<html>

<head>
    <title>Movie Search App</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #141E30, #243B55);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 450px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px black;
        }

        h1 {
            color: #333;
        }

        input {
            width: 230px;
            padding: 10px;
            font-size: 18px;
            border: 1px solid gray;
            border-radius: 5px;
        }

        .searchBtn {
            padding: 10px 20px;
            font-size: 18px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .searchBtn:hover {
            background: darkgreen;
        }

        img {
            width: 220px;
            border-radius: 10px;
            margin-top: 20px;
        }

        #result {
            margin-top: 20px;
            text-align: center;
        }

        .trailerBtn {
            background: red;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        .trailerBtn:hover {
            background: darkred;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>🎬 Movie Search App</h1>

        <input type="text" id="movie" placeholder="Enter Movie Name">

        <button class="searchBtn" onclick="searchMovie()">Search</button>

        <div id="result"></div>

    </div>

    <script>

        const apiKey = "8487f5e2";

        async function searchMovie() {

            let movie = document.getElementById("movie").value.trim();

            if (movie == "") {
                alert("Please Enter Movie Name");
                return;
            }

            let url = "https://www.omdbapi.com/?apikey=" + apiKey + "&t=" + movie;

            try {

                let response = await fetch(url);

                let data = await response.json();

                if (data.Response == "False") {
                    alert("Movie Not Found");
                    return;
                }

                document.getElementById("result").innerHTML =

                    "<img src='" + data.Poster + "'><br><br>" +

                    "<h2>" + data.Title + "</h2>" +

                    "<p><b>⭐ IMDb Rating:</b> " + data.imdbRating + "</p>" +

                    "<p><b>📅 Released:</b> " + data.Released + "</p>" +

                    "<p><b>🎭 Genre:</b> " + data.Genre + "</p>" +

                    "<p><b>🎬 Director:</b> " + data.Director + "</p>" +

                    "<p><b>🎭 Actors:</b> " + data.Actors + "</p>" +

                    "<p><b>⏱ Runtime:</b> " + data.Runtime + "</p>" +

                    "<p><b>🌍 Language:</b> " + data.Language + "</p>" +

                    "<p><b>🏆 Awards:</b> " + data.Awards + "</p>" +

                    "<p><b>📝 Plot:</b> " + data.Plot + "</p><br>" +

                    "<button class='trailerBtn' onclick=\"watchTrailer('" + data.Title + "')\">▶ Watch Trailer</button>";

            }

            catch (error) {

                alert("Something Went Wrong");

            }

        }

        function watchTrailer(movieName) {

            let url = "https://www.youtube.com/results?search_query=" + movieName + "+Official+Trailer";

            window.open(url, "_blank");

        }

    </script>

</body>

</html>
