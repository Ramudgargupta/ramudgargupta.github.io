<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Calculator | Ramudgar Gupta</title>

<link rel="stylesheet" href="calculator.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="calculator">

<h2>Calculator</h2>

<input type="text" id="display" readonly>

<div class="buttons">

<button class="operator" onclick="clearDisplay()">AC</button>
<button class="operator" onclick="deleteLast()">DEL</button>
<button class="operator" onclick="add('%')">%</button>
<button class="operator" onclick="add('/')">÷</button>

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button class="operator" onclick="add('*')">×</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button class="operator" onclick="add('-')">−</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button class="operator" onclick="add('+')">+</button>

<button onclick="add('0')">0</button>
<button onclick="add('.')">.</button>

<button class="equal" onclick="answer()">=</button>

</div>

</div>

<script src="calculator.js"></script>

</body>
</html>
