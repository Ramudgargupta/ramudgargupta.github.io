<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Professional Quiz App | Ramudgar Gupta</title>

    <link rel="stylesheet" href="quiz.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <h1>🧠 Professional Quiz App</h1>

    <!-- Progress -->

    <div class="progress-container">

        <div id="progressBar"></div>

    </div>

    <!-- Timer -->

    <div class="top-info">

        <div class="timer">
            ⏳ Time :
            <span id="time">60</span>s
        </div>

        <div class="question-count">
            Question
            <span id="questionNo">1</span>/10
        </div>

    </div>

    <!-- Quiz Box -->

    <div id="quizBox">

        <h2 id="question">
            Loading Question...
        </h2>

        <div id="answerButtons">

        </div>

        <div class="buttons">

            <button id="prevBtn">
                ⬅ Previous
            </button>

            <button id="nextBtn">
                Next ➜
            </button>

        </div>

    </div>

    <!-- Result -->

    <div id="resultBox" class="hide">

        <h2>🎉 Quiz Finished</h2>

        <h3 id="scoreText"></h3>

        <h4 id="percentage"></h4>

        <h4 id="highScore"></h4>

        <button id="restartBtn">
            🔄 Restart Quiz
        </button>

    </div>

</div>

<script src="quiz.js"></script>

</body>

</html>
